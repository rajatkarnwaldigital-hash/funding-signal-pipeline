name: Hook Generator

on:
  schedule:
    # SEMrush qualifier runs at 01:00/07:00/13:00/19:00, this runs 30 min after
    - cron: "30 1,7,13,19 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements_hookgen.txt

      - name: Write service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > /tmp/service_account.json

      - name: Run hook generator
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: /tmp/service_account.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python hook_generator.py

      - name: Remove service account key
        if: always()
        run: rm -f /tmp/service_account.json
