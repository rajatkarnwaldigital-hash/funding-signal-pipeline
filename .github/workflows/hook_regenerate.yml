name: Hook Regenerate (full reset + rerun)

on:
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements_hookgen.txt

      - name: Write service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > /tmp/service_account.json

      - name: Step 1 — requalify (downgrade over-ceiling rows, clear NO_COMPETITOR_GAP)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: /tmp/service_account.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python semrush_requalify.py

      - name: Step 2 — refresh paid_traffic for QUALIFIED rows (database uk)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: /tmp/service_account.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
        run: python paid_traffic_refresh.py

      - name: Step 3 — reset all GENERATED hooks for reprocessing
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: /tmp/service_account.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python hook_reset.py

      - name: Step 4 — generate hooks (batch 50)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: /tmp/service_account.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python hook_generator.py

      - name: Remove service account key
        if: always()
        run: rm -f /tmp/service_account.json
